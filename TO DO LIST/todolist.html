<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TO DO LIST - Elite Productivity</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --primary: #6366f1; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f8fafc; --text: #1e293b;
      --work-bg: #eef2ff; --health-bg: #ecfdf5; --personal-bg: #fffbeb;
    }

    * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; color: var(--text); }

    .app-viewport {
      width: 100%; max-width: 550px; background: white; min-height: 100vh;
      padding: 30px 20px; display: flex; flex-direction: column; position: relative;
    }

    /* Header & Navigation */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .h-btn { background: #f1f5f9; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; color: var(--primary); display: flex; align-items: center; justify-content: center; position: relative; }
    .notif-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; border: 2px solid white; display: none; }

    .pill-switch { background: #f1f5f9; padding: 5px; border-radius: 25px; display: flex; width: 220px; position: relative; margin: 0 auto 25px; }
    .pill-btn { flex: 1; border: none; background: none; padding: 10px; font-size: 12px; font-weight: 700; cursor: pointer; z-index: 2; color: #94a3b8; }
    .pill-btn.active { color: white; }
    .pill-bg { position: absolute; top: 5px; left: 5px; width: calc(50% - 5px); height: calc(100% - 10px); background: var(--primary); border-radius: 20px; z-index: 1; transition: 0.4s; }
    .month-mode .pill-bg { left: 50%; }

    /* Utility Bar */
    .utility-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
    .search-input-wrap { flex: 1; position: relative; }
    .search-input-wrap i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #cbd5e1; }
    .search-input-wrap input { width: 100%; padding: 12px 12px 12px 40px; border-radius: 18px; border: 1px solid #f1f5f9; background: #f8fafc; font-family: inherit; font-size: 13px; outline: none; }
    #monthSelector { flex: 1; padding: 12px; border-radius: 18px; border: 1px solid #f1f5f9; background: #f8fafc; font-family: inherit; font-weight: 600; color: var(--primary); outline: none; display: none; }

    /* Progress & Dashboard */
    .progress-banner { background: #6366f1; color: white; padding: 22px; border-radius: 30px; display: flex; align-items: center; gap: 20px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(99,102,241,0.15); }
    svg { transform: rotate(-90deg); width: 50px; height: 50px; }
    circle { fill: none; stroke-width: 6; stroke-linecap: round; }
    .ring-val { stroke: white; stroke-dasharray: 141; stroke-dashoffset: 141; transition: 1s; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat-tile { background: #fff; border: 1px solid #f1f5f9; padding: 15px 5px; border-radius: 20px; text-align: center; cursor: pointer; }
    .stat-tile b { display: block; font-size: 18px; color: var(--primary); }
    .stat-tile span { font-size: 8px; color: #94a3b8; font-weight: 800; text-transform: uppercase; }

    /* Timeline Styling */
    #dayView { flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
    .timeline-slot { position: relative; min-height: 55px; border-left: 2px solid #f1f5f9; margin-left: 65px; padding-left: 25px; }
    .slot-time { position: absolute; left: -65px; font-size: 10px; font-weight: 800; color: #94a3b8; top: 0; }
    
    .task-card {
      background: white; padding: 12px; border-radius: 20px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px; border-left: 6px solid var(--primary);
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    .task-card.cat-Work { border-left-color: var(--primary); background: var(--work-bg); }
    .task-card.cat-Health { border-left-color: var(--success); background: var(--health-bg); }
    .task-card.cat-Personal { border-left-color: var(--warning); background: var(--personal-bg); }
    
    .complete-trigger { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #cbd5e1; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0; }
    .task-card.done .complete-trigger { background: var(--success); border-color: var(--success); color: white; }
    .task-card.done { opacity: 0.4; filter: grayscale(1); }

    /* Month View Grid */
    #monthView { display: none; flex: 1; flex-direction: column; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .cal-day-cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 15px; border: 1px solid #f1f5f9; font-weight: 600; cursor: pointer; position: relative; font-size: 13px; }
    .cal-day-cell.active { background: var(--primary); color: white; }
    .red-dot { position: absolute; bottom: 6px; width: 5px; height: 5px; background: var(--danger); border-radius: 50%; }

    /* Footer & Modals */
    .footer-dock { padding: 20px 0; background: white; margin-top: auto; border-top: 1px solid #f1f5f9; }
    .f-row { display: flex; gap: 10px; margin-bottom: 10px; }
    input, select { padding: 14px; border-radius: 15px; border: 1px solid #f1f5f9; background: #f8fafc; font-family: inherit; font-size: 14px; outline: none; width: 100%; }
    .v-btn { background: #f1f5f9; border: none; width: 48px; height: 48px; border-radius: 15px; cursor: pointer; color: var(--primary); }
    .v-btn.active { color: var(--danger); animation: pulse 1.5s infinite; }

    #modalOverlay, #analyticsModal, #settingsModal, #notifModal { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.98); z-index:1000; display:none; flex-direction:column; justify-content:center; padding:40px; }
    .log-item { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 12px; line-height: 1.5; }
    .log-tag { font-weight: 700; text-transform: uppercase; font-size: 9px; padding: 2px 8px; border-radius: 10px; margin-bottom: 5px; display: inline-block; color: white; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 25px; border-radius: 30px; font-size: 12px; display: none; z-index: 2000; }
  </style>
</head>
<body onload="init()">

<audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
<div id="toast">Saved!</div>

<div class="app-viewport" id="mainWrapper">
  <header>
    <div style="display:flex; align-items:center; gap:12px">
        <button class="h-btn" onclick="navDate(-1)"><i class="fas fa-chevron-left"></i></button>
        <h3 id="curDateLabel" style="margin:0; font-size: 16px; width: 90px; text-align: center;">-- --</h3>
        <button class="h-btn" onclick="navDate(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div style="display:flex; gap:10px">
        <button class="h-btn" onclick="openNotifs()">
            <i class="fas fa-bell"></i>
            <div class="notif-dot" id="bellDot"></div>
        </button>
        <button class="h-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>
        <button class="h-btn" onclick="speakTasks()"><i class="fas fa-volume-up"></i></button>
    </div>
  </header>

  <div class="pill-switch">
      <button id="dayBtn" class="pill-btn active" onclick="switchV('day')">Day</button>
      <button id="monthBtn" class="pill-btn" onclick="switchV('month')">Month</button>
      <div class="pill-bg"></div>
  </div>

  <div class="utility-row">
      <div class="search-input-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="search" placeholder="Search tasks or time..." oninput="render()">
      </div>
      <select id="monthSelector" onchange="jumpToMonth()">
          <option value="0">January</option><option value="1">February</option><option value="2">March</option>
          <option value="3">April</option><option value="4">May</option><option value="5">June</option>
          <option value="6">July</option><option value="7">August</option><option value="8">September</option>
          <option value="9">October</option><option value="10">November</option><option value="11">December</option>
      </select>
  </div>

  <div class="progress-banner">
    <svg><circle style="stroke:rgba(255,255,255,0.2)" cx="25" cy="25" r="22.5"></circle><circle id="ringVal" class="ring-val" cx="25" cy="25" r="22.5"></circle></svg>
    <div>
        <h4 id="progTitle" style="margin:0; font-size: 14px;">Daily Schedule</h4>
        <small id="progStats">0 task done</small>
    </div>
  </div>

  <div class="stats-row">
      <div class="stat-tile" onclick="openDetails('assigned')"><b id="c-all">0</b><span>Assigned</span></div>
      <div class="stat-tile" onclick="openDetails('pending')"><b id="c-pending">0</b><span>Pending</span></div>
      <div class="stat-tile" onclick="openDetails('done')"><b id="c-done">0</b><span>Done</span></div>
  </div>

  <div id="dayView"><div id="timeline"></div></div>
  
  <div id="monthView">
      <div class="cal-grid" style="grid-template-columns: repeat(7, 1fr); margin-bottom: 10px; text-align: center; font-size: 9px; font-weight: 800; color: #cbd5e1;">
          <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
      </div>
      <div id="monthGrid" class="cal-grid"></div>
  </div>

  <div class="footer-dock">
    <div class="f-row">
        <input type="text" id="tIn" placeholder="I need to do...">
        <button class="v-btn" id="vBtn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
    </div>
    <div class="f-row">
        <input type="time" id="tTime" value="09:00" style="flex:1">
        <select id="tCat" style="flex:1">
            <option value="Work">💼 Work</option>
            <option value="Health">🍏 Health</option>
            <option value="Personal">🏠 Personal</option>
        </select>
    </div>
    <button onclick="addTask()" style="width:100%; padding:16px; border:none; border-radius:18px; background:var(--primary); color:white; font-weight:700; cursor:pointer">Create Task</button>
  </div>

  <div id="notifModal">
      <h3>Notifications</h3>
      <div id="notifList" style="overflow-y: auto; max-height: 60vh; margin: 20px 0;"></div>
      <button onclick="closeModal()" style="background:var(--primary); color:white; border:none; padding:15px; border-radius:18px; width:100%; font-weight:700">Close</button>
  </div>

  <div id="settingsModal">
      <h3>Alert Settings</h3>
      <select id="globalInt" style="margin:20px 0">
          <option value="60">1 Hour Before</option>
          <option value="30">30 Minutes Before</option>
          <option value="15">15 Minutes Before</option>
      </select>
      <button onclick="closeModal()" style="background:var(--primary); color:white; padding:15px; border:none; border-radius:18px; width:100%; font-weight:700">Apply Settings</button>
  </div>

  <div id="modalOverlay">
      <h3>Edit Task</h3>
      <input type="text" id="eTitle" placeholder="Task Name">
      <input type="date" id="eDate">
      <input type="time" id="eTime">
      <select id="eCat">
          <option value="Work">Work</option><option value="Health">Health</option><option value="Personal">Personal</option>
      </select>
      <button onclick="saveEdit()" style="background:var(--primary); color:white; padding:15px; border:none; border-radius:18px; width:100%; font-weight:700; margin-top:10px">Save Changes</button>
      <button onclick="closeModal()" style="background:none; border:none; color:#94a3b8; margin-top:15px; width:100%; cursor:pointer">Cancel</button>
  </div>

  <div id="analyticsModal">
    <h3 id="modalTitle">View Details</h3>
    <div id="modalList" style="overflow-y: auto; max-height: 50vh; margin: 20px 0;"></div>
    <button onclick="closeModal()" style="background:var(--primary); color:white; border:none; padding:15px; border-radius:18px; width:100%; font-weight:700">Close</button>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('elite_prod_v10')) || [];
  let logs = JSON.parse(localStorage.getItem('elite_logs_v10')) || [];
  let curD = new Date();
  let vType = 'day', eId = null;

  const recog = (window.SpeechRecognition || window.webkitSpeechRecognition) ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
  const synth = window.speechSynthesis;

  function init() { render(); setInterval(checkAlerts, 15000); }

  function render() {
    const ds = curD.toISOString().split('T')[0], mPrefix = ds.substring(0, 7);
    const q = document.getElementById('search').value.toLowerCase();
    
    const dTasks = tasks.filter(t => t.date === ds);
    const mTasks = tasks.filter(t => t.date.startsWith(mPrefix));
    const activeTasks = vType === 'day' ? dTasks : mTasks;

    // Stats
    document.getElementById('c-all').innerText = activeTasks.length;
    document.getElementById('c-pending').innerText = activeTasks.filter(t => !t.done).length;
    document.getElementById('c-done').innerText = activeTasks.filter(t => t.done).length;

    const doneCount = activeTasks.filter(t => t.done).length, perc = activeTasks.length ? Math.round((doneCount / activeTasks.length) * 100) : 0;
    document.getElementById('ringVal').style.strokeDashoffset = 141 - (141 * perc) / 100;
    document.getElementById('progStats').innerText = `${doneCount} out of ${activeTasks.length} done`;

    if (vType === 'day' && activeTasks.length > 0 && doneCount === activeTasks.length) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

    document.getElementById('curDateLabel').innerText = curD.toLocaleDateString('en-US', {day:'numeric', month:'short'});

    if(vType === 'day') {
        document.getElementById('monthSelector').style.display = 'none';
        document.getElementById('monthView').style.display = 'none';
        document.getElementById('dayView').style.display = 'block';
        renderTimeline(dTasks, q);
    } else {
        document.getElementById('monthSelector').style.display = 'block';
        document.getElementById('monthSelector').value = curD.getMonth();
        document.getElementById('dayView').style.display = 'none';
        document.getElementById('monthView').style.display = 'flex';
        renderMonthGrid();
    }
  }

  function renderTimeline(dayTasks, q) {
    const container = document.getElementById('timeline');
    container.innerHTML = '';
    
    // UPDATED: Search Filters + Alphabetical Sort (within Time slots)
    let filtered = dayTasks
        .filter(t => t.title.toLowerCase().includes(q) || t.time.includes(q))
        .sort((a,b) => a.time.localeCompare(b.time) || a.title.localeCompare(b.title));

    for (let h = 0; h < 24; h++) {
        const slot = document.createElement('div');
        slot.className = 'timeline-slot';
        slot.innerHTML = `<div class="slot-time">${h % 12 || 12}${h < 12 ? 'AM' : 'PM'}</div>`;
        
        const hourTasks = filtered.filter(t => parseInt(t.time.split(':')[0]) === h);
        hourTasks.forEach(t => {
            const card = document.createElement('div');
            card.className = `task-card cat-${t.cat} ${t.done ? 'done' : ''}`;
            card.innerHTML = `
                <div class="complete-trigger" onclick="toggleTask(${t.id})">${t.done ? '<i class="fas fa-check"></i>' : ''}</div>
                <div style="flex:1"><b>${t.title}</b><br><small>${t.time}</small></div>
                <div style="display:flex; gap:12px; color:#94a3b8"><i class="fas fa-edit" onclick="openEdit(${t.id})"></i><i class="fas fa-trash-alt" style="color:var(--danger)" onclick="deleteTask(${t.id})"></i></div>`;
            slot.appendChild(card);
        });
        container.appendChild(slot);
    }
  }

  function renderMonthGrid() {
    const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
    const y = curD.getFullYear(), m = curD.getMonth(), first = new Date(y, m, 1).getDay(), total = new Date(y, m + 1, 0).getDate();
    for (let i = 0; i < first; i++) grid.innerHTML += `<div class="cal-day-cell" style="border:none; background:none"></div>`;
    for (let d = 1; d <= total; d++) {
        const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const has = tasks.some(t => t.date === dStr);
        grid.innerHTML += `<div class="cal-day-cell ${dStr===curD.toISOString().split('T')[0] ? 'active' : ''}" onclick="setD('${dStr}')">${d}${has ? '<div class="red-dot"></div>' : ''}</div>`;
    }
  }

  function addLog(text, type) {
    const colors = { created: '#6366f1', done: '#10b981', edited: '#f59e0b' };
    logs.unshift({ text, type, timestamp: new Date().toLocaleTimeString(), color: colors[type] });
    document.getElementById('bellDot').style.display = 'block';
    localStorage.setItem('elite_logs_v10', JSON.stringify(logs));
  }

  function openNotifs() {
      document.getElementById('bellDot').style.display = 'none';
      const listEl = document.getElementById('notifList');
      listEl.innerHTML = logs.length ? '' : '<p style="text-align:center">No new activity.</p>';
      logs.slice(0, 20).forEach(l => {
          listEl.innerHTML += `<div class="log-item">
            <span class="log-tag" style="background:${l.color}">${l.type}</span><br>
            ${l.text}<br><small style="color:#94a3b8">${l.timestamp}</small>
          </div>`;
      });
      document.getElementById('notifModal').style.display = 'flex';
  }

  function addTask() {
    const title = document.getElementById('tIn').value;
    const time = document.getElementById('tTime').value;
    if(!title) return;
    const ds = curD.toISOString().split('T')[0];
    tasks.push({ id: Date.now(), title, time, date: ds, cat: document.getElementById('tCat').value, done: false, alerted: false });
    addLog(`Task created: "${title}" at ${time}`, 'created');
    save(); document.getElementById('tIn').value = '';
  }

  function toggleTask(id) { 
    tasks = tasks.map(t => {
        if(t.id === id) {
            const status = !t.done;
            if(status) {
                const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                addLog(`Completed: "${t.title}" at ${now}`, 'done');
            }
            return {...t, done: status};
        }
        return t;
    }); 
    save(); 
  }

  function openEdit(id) {
    eId = id; const t = tasks.find(x => x.id === id);
    document.getElementById('eTitle').value = t.title;
    document.getElementById('eDate').value = t.date;
    document.getElementById('eTime').value = t.time;
    document.getElementById('eCat').value = t.cat;
    document.getElementById('modalOverlay').dataset.oldTime = t.time;
    document.getElementById('modalOverlay').dataset.oldDate = t.date;
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function saveEdit() {
    const oldTime = document.getElementById('modalOverlay').dataset.oldTime;
    const oldDate = document.getElementById('modalOverlay').dataset.oldDate;
    const newTime = document.getElementById('eTime').value;
    const newDate = document.getElementById('eDate').value;

    tasks = tasks.map(t => {
        if(t.id === eId) {
            if(oldTime !== newTime || oldDate !== newDate) {
                addLog(`Edited: "${t.title}" shifted to ${newDate} ${newTime}`, 'edited');
            }
            return {...t, title: document.getElementById('eTitle').value, date: newDate, time: newTime, cat: document.getElementById('eCat').value, alerted: false};
        }
        return t;
    });
    closeModal(); save();
  }

  function checkAlerts() {
    const now = new Date(), ct = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
    tasks.forEach(t => { if(t.date === now.toISOString().split('T')[0] && t.time === ct && !t.done && !t.alerted) { 
        document.getElementById('alarmSound').play(); t.alerted = true; save(); 
    } });
  }

  function toggleVoice() {
    if(!recog) return;
    const btn = document.getElementById('vBtn');
    recog.start(); btn.classList.add('active');
    recog.onresult = (e) => { 
        document.getElementById('tIn').value = e.results[0][0].transcript; 
        btn.classList.remove('active'); 
    };
    recog.onend = () => btn.classList.remove('active');
  }

  function jumpToMonth() { curD.setMonth(document.getElementById('monthSelector').value); render(); }
  function navDate(dir) { if(vType==='day') curD.setDate(curD.getDate()+dir); else curD.setMonth(curD.getMonth()+dir); render(); }
  function setD(d) { curD = new Date(d); switchV('day'); }
  function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); save(); }
  function save() { localStorage.setItem('elite_prod_v10', JSON.stringify(tasks)); render(); }
  function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
  function closeModal() { document.querySelectorAll('#modalOverlay, #analyticsModal, #settingsModal, #notifModal').forEach(m => m.style.display='none'); }
  function speakTasks() { const ds = curD.toISOString().split('T')[0]; const pending = tasks.filter(t => t.date === ds && !t.done); synth.speak(new SpeechSynthesisUtterance(pending.length > 0 ? `You have ${pending.length} tasks.` : "Schedule clear.")); }
  function switchV(v) { vType = v; document.getElementById('mainWrapper').classList.toggle('month-mode', v==='month'); render(); }
  
  function openDetails(mode) { 
    const listEl = document.getElementById('modalList');
    listEl.innerHTML = '';
    const ds = curD.toISOString().split('T')[0], mPrefix = ds.substring(0, 7);
    let list = vType === 'day' ? tasks.filter(t => t.date === ds) : tasks.filter(t => t.date.startsWith(mPrefix));
    if(mode === 'pending') list = list.filter(t => !t.done);
    else if (mode === 'done') list = list.filter(t => t.done);
    list.forEach(t => { listEl.innerHTML += `<div style="padding:10px; border-bottom:1px solid #f1f5f9"><b>${t.title}</b><br><small>${t.date} | ${t.time}</small></div>`; });
    document.getElementById('analyticsModal').style.display = 'flex';
  }
</script>
</body>
</html>
