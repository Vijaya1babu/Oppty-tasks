<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Do List</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: "Poppins", Arial, sans-serif;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .container {
      width: 360px;
      background: #ffffff;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
    }

    button#addBtn {
      padding: 10px 15px;
      background: #2193b0;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      padding: 0;
      max-height: 300px;
      overflow-y: auto;
    }

    li {
      list-style: none;
      margin: 10px 0;
      padding: 12px;
      background: #f0f8ff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 10px;
      border-left: 5px solid #2193b0;
      transition: 0.3s;
    }

    /* Completed Task Styling */
    li.completed {
      background: #e0e0e0;
      border-left-color: #888;
      opacity: 0.7;
    }

    li.completed span {
      text-decoration: line-through;
      color: #777;
    }

    .actions i {
      margin-left: 12px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    .fa-check { color: #2ecc71; }
    .fa-edit { color: #f39c12; }
    .fa-trash { color: #e74c3c; }

    .actions i:hover { transform: scale(1.2); }
  </style>
</head>
<body>

  <div class="container">
    <h2>My To Do List</h2>
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Enter a task...">
      <button id="addBtn">Add</button>
    </div>
    <ul id="taskList"></ul>
  </div>

<script>
  // Reference elements
  const taskInput = document.getElementById("taskInput");
  const addBtn = document.getElementById("addBtn");
  const taskList = document.getElementById("taskList");

  // Create (Add Task)
  addBtn.addEventListener("click", addTask);

  function addTask() {
    let taskText = taskInput.value.trim();

    if (taskText === "") {
      alert("Please enter a task");
      return;
    }

    const li = document.createElement("li");

    // Task text span
    const span = document.createElement("span");
    span.textContent = taskText;

    // Action container
    const actionDiv = document.createElement("div");
    actionDiv.className = "actions";

    // 1. Update (Toggle Complete)
    const checkIcon = document.createElement("i");
    checkIcon.className = "fas fa-check";
    checkIcon.title = "Mark as Complete";
    checkIcon.onclick = () => li.classList.toggle("completed");

    // 2. Update (Edit Text)
    const editIcon = document.createElement("i");
    editIcon.className = "fas fa-edit";
    editIcon.title = "Edit Task";
    editIcon.onclick = () => {
      let newTask = prompt("Edit your task:", span.textContent);
      if (newTask !== null && newTask.trim() !== "") {
        span.textContent = newTask;
      }
    };

    // 3. Delete
    const deleteIcon = document.createElement("i");
    deleteIcon.className = "fas fa-trash";
    deleteIcon.title = "Delete Task";
    deleteIcon.onclick = () => li.remove();

    // Append everything
    actionDiv.append(checkIcon, editIcon, deleteIcon);
    li.append(span, actionDiv);
    taskList.appendChild(li);

    // Clear input
    taskInput.value = "";
  }
</script>

</body>
</html>
