<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopHub </title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* GLASS HEADER */
        header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            height: 70px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .logo {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }

        .nav-actions { display: flex; gap: 15px; align-items: center; }

        .btn-icon {
            background: white;
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            gap: 8px;
            align-items: center;
            color: var(--text-main);
            text-decoration: none;
        }

        .btn-icon:hover { background: var(--accent); color: white; transform: translateY(-2px); }

        .cart-badge {
            background: var(--accent);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 20px;
        }

        /* HERO SECTION */
        .hero {
            padding: 140px 20px 60px;
            text-align: center;
        }

        .hero h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 10px; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; }

        /* PRODUCT GRID */
        .products-grid {
            max-width: 1200px;
            margin: 0 auto 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .product-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .product-img {
            width: 100%;
            height: 250px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .product-info h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .product-info .price { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
        .product-info .cat { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }

        .add-btn {
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            border-radius: 15px;
            border: none;
            background: var(--text-main);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .add-btn:hover { background: var(--accent); box-shadow: 0 10px 20px var(--accent-glow); }
        .add-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* DRAWER (Cart & History) */
        .drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 400px;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
        }

        .drawer.open { right: 0; }

        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .drawer-header h2 { font-family: 'Fraunces', serif; }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 1500;
        }
        .overlay.active { display: block; }

        /* CART ITEMS */
        .cart-item {
            display: flex;
            gap: 15px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid #f1f5f9;
        }

        /* COUPON SECTION */
        .coupon-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .coupon-box input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }

        .coupon-box button {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--text-main);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 3000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }

    </style>
</head>

<body>

<header>
    <a href="#" class="logo">OPPTY</a>
    
    <div class="nav-actions">
        <button class="btn-icon" onclick="openDrawer('orderDrawer')">
            <i class="fa-solid fa-receipt"></i> <span>History</span>
        </button>
        
        <button class="btn-icon" onclick="openDrawer('cartDrawer')" style="background: var(--text-main); color: white;">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cartCount" class="cart-badge">0</span>
        </button>
    </div>
</header>

<div id="overlay" class="overlay" onclick="closeAll()"></div>

<div id="cartDrawer" class="drawer">
    <div class="drawer-header">
        <h2>Your Cart</h2>
        <i class="fa-solid fa-xmark" onclick="closeAll()" style="cursor: pointer;"></i>
    </div>
    
    <div id="cartItems" style="flex:1; overflow:auto;">
        </div>

    <div class="coupon-box">
        <input id="couponIn" placeholder="Enter Coupon Code...">
        <button onclick="applyCoupon()">Apply Discount</button>
    </div>

    <div style="margin-top: 20px;">
        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.2rem; margin-bottom: 15px;">
            <span>Total</span>
            <span id="cartTotal">₹0</span>
        </div>
        <button class="add-btn" onclick="checkout()" style="background: var(--accent); padding: 18px; font-size: 1rem;">
            Confirm Checkout
        </button>
    </div>
</div>

<div id="orderDrawer" class="drawer">
    <div class="drawer-header">
        <h2>History</h2>
        <i class="fa-solid fa-xmark" onclick="closeAll()" style="cursor: pointer;"></i>
    </div>
    <div id="orderHistory" style="flex:1; overflow:auto;"></div>
</div>

<main>
    <section class="hero">
        <h1>Essential Collection</h1>
        <p>Curated premium goods for your everyday lifestyle.</p>
    </section>

    <div class="products-grid" id="productGrid"></div>
</main>

<script>
    const fmt = n => "₹" + Number(n).toLocaleString('en-IN');

    const Store = {
        _db: "sh_db_v2", // Matches the Admin Database Name
        get() {
            return JSON.parse(localStorage.getItem(this._db)) || { products: [], orders: [], coupons: [] };
        },
        set(d) {
            localStorage.setItem(this._db, JSON.stringify(d));
        }
    };

    let appliedCoupon = null;

    function render() {
        const data = Store.get();
        const grid = document.getElementById("productGrid");
        
        if(data.products.length === 0) {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:gray;'>No products available. Go to Admin to add some!</p>";
            return;
        }

        grid.innerHTML = data.products.map(p => `
            <div class="product-card">
                <img src="${p.image}" class="product-img">
                <div class="product-info">
                    <div class="cat">${p.category}</div>
                    <h3>${p.name}</h3>
                    <div class="price">${fmt(p.price)}</div>
                    <div style="font-size: 12px; color: ${p.stock < 5 ? 'red' : 'gray'}; margin-top:5px">
                        ${p.stock > 0 ? `In Stock: ${p.stock}` : 'Out of Stock'}
                    </div>
                    <button class="add-btn" onclick="addToCart(${p.id})" ${p.stock <= 0 ? "disabled" : ""}>
                        ${p.stock <= 0 ? "Unavailable" : "Add to Cart"}
                    </button>
                </div>
            </div>
        `).join("");

        const cart = JSON.parse(localStorage.getItem("sh_cart")) || [];
        document.getElementById("cartCount").innerText = cart.length;
    }

    function addToCart(id) {
        let cart = JSON.parse(localStorage.getItem("sh_cart")) || [];
        const data = Store.get();
        const p = data.products.find(x => x.id === id);

        if (p.stock <= 0) return toast("Sorry, out of stock!");

        cart.push({...p}); // Add a copy
        localStorage.setItem("sh_cart", JSON.stringify(cart));
        
        render();
        toast(`${p.name} added!`);
    }

    function applyCoupon() {
        const codeInput = document.getElementById("couponIn").value.toUpperCase();
        const data = Store.get();
        const cart = JSON.parse(localStorage.getItem("sh_cart")) || [];
        const subtotal = cart.reduce((s, i) => s + i.price, 0);

        const coupon = data.coupons.find(c => c.code === codeInput);

        // 1. Check if coupon exists
        if (!coupon) return toast("Invalid Coupon Code");

        // 2. Check if coupon is DISABLED (NEW FEATURE)
        if (coupon.status === 'disabled') {
            return toast("Invalid: This coupon is currently inactive.");
        }

        // 3. Check Minimum Order
        if (subtotal < coupon.minOrder) {
            return toast(`Min. spend ${fmt(coupon.minOrder)} required`);
        }

        // 4. Check Usage Limit
        if (coupon.maxUses > 0 && coupon.uses >= coupon.maxUses) {
            return toast("Coupon limit reached");
        }

        appliedCoupon = coupon;
        updateCartDisplay();
        toast(`Success! ${coupon.code} applied`);
    }

    function updateCartDisplay() {
        const cart = JSON.parse(localStorage.getItem("sh_cart")) || [];
        const cartItemsDiv = document.getElementById("cartItems");
        
        if(cart.length === 0) {
            cartItemsDiv.innerHTML = "<p style='text-align:center; padding: 40px; color: gray;'>Your cart is empty.</p>";
            document.getElementById("cartTotal").innerText = fmt(0);
            return;
        }

        const subtotal = cart.reduce((s, i) => s + i.price, 0);
        let finalTotal = subtotal;

        if (appliedCoupon) {
            const disc = appliedCoupon.type === "percent" ? 
                         subtotal * (appliedCoupon.value / 100) : 
                         appliedCoupon.value;
            finalTotal = Math.max(0, subtotal - disc);
        }

        cartItemsDiv.innerHTML = cart.map((i, idx) => `
            <div class="cart-item">
                <img src="${i.image}" style="width:50px; height:50px; border-radius:10px; object-fit:cover;">
                <div style="flex:1">
                    <div style="font-weight:600; font-size:14px;">${i.name}</div>
                    <div style="color:var(--accent); font-weight:700;">${fmt(i.price)}</div>
                </div>
                <i class="fa-solid fa-trash" onclick="removeFromCart(${idx})" style="color:#ef4444; cursor:pointer;"></i>
            </div>
        `).join("");

        document.getElementById("cartTotal").innerText = fmt(finalTotal);
    }

    function removeFromCart(index) {
        let cart = JSON.parse(localStorage.getItem("sh_cart")) || [];
        cart.splice(index, 1);
        localStorage.setItem("sh_cart", JSON.stringify(cart));
        if(cart.length === 0) appliedCoupon = null;
        updateCartDisplay();
        render();
    }

   function checkout() {
    const cart = JSON.parse(localStorage.getItem("sh_cart")) || [];
    if (!cart.length) return toast("Add items first!");

    const data = Store.get();
    let subtotal = cart.reduce((s, i) => s + i.price, 0);
    let finalTotal = subtotal;

    if (appliedCoupon) {
        const disc = appliedCoupon.type === "percent" ? subtotal * (appliedCoupon.value / 100) : appliedCoupon.value;
        finalTotal = Math.max(0, subtotal - disc);
        const dbCoupon = data.coupons.find(x => x.code === appliedCoupon.code);
        if(dbCoupon) dbCoupon.uses++;
    }

    // Update global inventory
    cart.forEach(item => {
        const p = data.products.find(x => x.id === item.id);
        if(p) {
            p.stock--;
            p.sold = (p.sold || 0) + 1;
        }
    });

    // Create a UNIQUE order object
    // Using Date.now() ensures every single purchase has a unique ID even for the same product
    const order = {
        id: Date.now(), 
        time: new Date().toLocaleString(),
        total: finalTotal,
        couponCode: appliedCoupon ? appliedCoupon.code : null,
        status: "Placed", // Default status for NEW orders
        items: [...cart]  // This captures the products at the moment of purchase
    };

    data.orders.push(order);
    Store.set(data);

    localStorage.setItem("sh_cart", "[]");
    appliedCoupon = null;
    
    closeAll();
    render();
    alert("✨ Order Placed Successfully!");
}

function renderOrders() {
    const data = Store.get();
    const orders = data.orders;
    const histDiv = document.getElementById("orderHistory");

    if(!orders || orders.length === 0) {
        histDiv.innerHTML = "<p style='text-align:center; padding:40px; color:gray;'>No orders yet.</p>";
        return;
    }

    histDiv.innerHTML = orders.map(o => {
        // Dynamic color based on the SPECIFIC order status
        let color = "#3b82f6"; // Blue for Placed
        if(o.status === "Shipped") color = "#7c3aed"; // Purple
        if(o.status === "Delivered") color = "#10b981"; // Green

        return `
            <div style="background:white; padding:20px; border-radius:15px; margin-bottom:15px; border:1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="font-weight:800; font-size: 0.9rem;">Order ID: #${o.id.toString().slice(-6)}</span>
                    <span style="color:var(--accent); font-weight:700;">${fmt(o.total)}</span>
                </div>
                <div style="font-size:12px; color:gray; margin-bottom:8px;">${o.time}</div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <div style="width:8px; height:8px; border-radius:50%; background:${color}"></div>
                    <span style="font-size:13px; font-weight:700; color:${color}">${o.status}</span>
                </div>
                <div style="margin-top:10px; border-top:1px dashed #eee; pt:10px; font-size:12px; color:#666;">
                    ${o.items.map(item => item.name).join(", ")}
                </div>
            </div>
        `;
    }).reverse().join("");
}

    function openDrawer(id) {
        document.getElementById(id).classList.add("open");
        document.getElementById("overlay").classList.add("active");
        if (id === "cartDrawer") updateCartDisplay();
        if (id === "orderDrawer") renderOrders();
    }

    function closeAll() {
        document.querySelectorAll(".drawer").forEach(x => x.classList.remove("open"));
        document.getElementById("overlay").classList.remove("active");
    }

    function toast(m) {
        const t = document.createElement("div");
        t.className = "toast";
        t.innerText = m;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    // Initialize
    render();
</script>

</body>
</html>
