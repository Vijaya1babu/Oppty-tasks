<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oppty Edu | Secure Access Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --dark: #0f172a;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                        url('https://png.pngtree.com/thumb_back/fh260/background/20240919/pngtree-a-background-of-orange-blue-and-yellow-gradients-with-gritty-appearance-image_16233934.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            display: flex;
            width: 900px;
            height: 600px;
            background: var(--white);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .visual-side {
            flex: 1;
            background: linear-gradient(rgba(99, 102, 241, 0.8), rgba(79, 70, 229, 0.8)), 
                        url('https://www.meridean.org/assets/frontend/images/web-student-login-img.png');
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
        }

        .visual-side h1 { font-size: 2.5rem; margin-bottom: 15px; }
        .welcome-icon { font-size: 4rem; margin-bottom: 20px; }

        .form-side {
            flex: 1.2;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-header { margin-bottom: 30px; }
        .auth-header h2 { font-size: 2rem; color: var(--dark); }

        .field-group { margin-bottom: 18px; }
        .field-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; color: #475569; }
        .field-group label i { margin-right: 8px; color: var(--primary); }

        .field-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            transition: 0.3s;
        }

        .field-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .main-btn:hover { background: var(--secondary); transform: translateY(-2px); }

        .toggle-link { margin-top: 25px; text-align: center; font-size: 0.9rem; color: #64748b; }
        .toggle-link a { color: var(--primary); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="visual-side">
            <div class="welcome-icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <h1>welcome back</h1>
        </div>

        <div class="form-side">
            <div class="auth-header">
                <h2 id="formTitle">Welcome Back</h2>
                <p id="formSubtitle">Enter your credentials to access your account.</p>
            </div>

            <form id="authForm">
                <div class="field-group" id="nameGroup" style="display: none;">
                    <label for="userName"><i class="fa fa-user"></i> Full Name</label>
                    <input type="text" id="userName" placeholder="Rahul Varma">
                </div>

                <div class="field-group">
                    <label for="email"><i class="fa fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="rahul@gmail.com" required>
                </div>

                <div class="field-group">
                    <label for="password"><i class="fa fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="field-group" id="confirmGroup" style="display: none;">
                    <label for="confirmPassword"><i class="fa fa-shield-halved"></i> Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••">
                </div>

                <button type="submit" id="submitBtn" class="main-btn">Login</button>
            </form>

            <div class="toggle-link" id="toggleText">
                Don't have an account? <a href="#" onclick="toggleMode(event)">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        let isLogin = true;

        const toggleMode = (e) => {
            if(e) e.preventDefault();
            isLogin = !isLogin;
            
            // Toggle UI elements using original standard method
            document.getElementById('formTitle').textContent = isLogin ? "Welcome Back" : "Create Account";
            document.getElementById('formSubtitle').textContent = isLogin ? "Enter your credentials." : "Join us today!";
            document.getElementById('submitBtn').textContent = isLogin ? "Login" : "Sign Up";
            
            const displayStyle = isLogin ? "none" : "block";
            document.getElementById('nameGroup').style.display = displayStyle;
            document.getElementById('confirmGroup').style.display = displayStyle;
            
            // Toggle Required attributes
            document.getElementById('userName').required = !isLogin;
            document.getElementById('confirmPassword').required = !isLogin;
            
            document.getElementById('toggleText').innerHTML = isLogin 
                ? `Don't have an account? <a href="#" onclick="toggleMode(event)">Sign Up</a>`
                : `Already have an account? <a href="#" onclick="toggleMode(event)">Login</a>`;
            
            document.getElementById('authForm').reset();
        };

        document.getElementById('authForm').onsubmit = (e) => {
            e.preventDefault();
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if (!isLogin) {
                // SIGN UP VALIDATION
                const name = document.getElementById('userName').value;
                const confirmPass = document.getElementById('confirmPassword').value;

                // 1. Password Strength: Starts with Uppercase, at least 6 chars
                const passRegex = /^[A-Z].{5,}$/;
                
                if (!passRegex.test(pass)) {
                    return alert(" Password must start with an Uppercase letter and be at least 6 characters long.");
                }
                if (pass !== confirmPass) {
                    return alert(" Passwords do not match!");
                }
                if (users.some(u => u.email === email)) {
                    return alert(" Email already registered!");
                }

                // Save User
                users.push({ name, email, pass });
                localStorage.setItem('users', JSON.stringify(users));
                alert(" Registration Successful!");
                toggleMode();
            } else {
                // LOGIN LOGIC
                const user = users.find(u => u.email === email && u.pass === pass);
                if (user) {
                    alert(` Welcome back, ${user.name}!`);
                    window.location.href = "student.html";
                } else {
                    alert(" Invalid email or password.");
                }
            }
        };
    </script>
</body>
</html>
