
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oppty SR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">    
</head>
<body>
    <div class="tit">
        <img src="https://cmsv2-assets.apptegy.net/uploads/10002/file/1006429/f8c85bd3-9e85-4228-9521-1f27afe2b7e9.png">
    </div>

<div class="main-container">
    <div class="form-side">
        <form id="studentForm">
            <section class="form-card">
                <div class="section-title"><h3><i class="fa-solid fa-user-circle"></i> Personal Identity</h3></div>
                <div class="grid-4">
                    <div class="input-group">
                        <label><span>*</span>Title:</label>
                        <select id="title" required>
                            <option value="">Select</option>
                            <option value="Mr.">Mr.</option>
                            <option value="Ms.">Ms.</option>
                            <option value="Mrs.">Mrs.</option>
                            <option value="Smt.">Smt.</option>
                            <option value="Dr.">Dr.</option>
                        </select>
                    </div>
                    <div class="input-group"><label><span>*</span>Reg No:</label><input type="text" id="regNo" required minlength="1" maxlength="15"></div>
                    <div class="input-group"><label><span>*</span>First Name:</label><input type="text" id="fname" required minlength="1" maxlength="30"></div>
                    <div class="input-group"><label><span>*</span>Last Name:</label><input type="text" id="lname" required minlength="1" maxlength="30"></div>
                </div>
                <div class="grid-3">
                    <div class="input-group">
                        <label><span>*</span>Email:</label>
                        <input type="email" id="email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Enter a valid email (e.g. name@domain.com)">
                    </div>
                    <div class="input-group"><label><span>*</span>Phone:</label><input type="tel" id="phone" required minlength="10" maxlength="13"></div>
                    <div class="input-group"><label><span>*</span>Aadhaar No:</label><input type="text" id="aadhaar" required pattern="\d{12}" maxlength="12" title="Exactly 12 digits required"></div>
                </div>
                <div class="grid-3">
                    <div class="input-group"><label><span>*</span>DOB:</label><input type="date" id="dob" required></div>
                    <div class="input-group"><label>Age:</label><input type="text" id="age" readonly style="background:#f1f5f9"></div>
                    <div class="input-group">
                        <label><span>*</span>Gender:</label>
                        <div class="radio-tile-group">
                            <div class="radio-item">
                                <input type="radio" name="gender" id="male" value="Male" required>
                                <label for="male">Male</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="gender" id="female" value="Female">
                                <label for="female">Female</label>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="form-card">
                <div class="section-title"><h3><i class="fa-solid fa-graduation-cap"></i> Educational Details</h3></div>
                <div class="grid-2">
                    <div class="input-group"><label><span>*</span>Highest Qualification:</label><input type="text" id="qual" required minlength="1" maxlength="50"></div>
                    <div class="input-group"><label><span>*</span>Year of Passing:</label><input type="number" id="passYear" required min="1950" max="2030"></div>
                </div>
                <div class="grid-2">
                    <div class="input-group"><label><span>*</span>College Name:</label><input type="text" id="clgName" required minlength="1" maxlength="100"></div>
                    <div class="input-group">
                        <label><span>*</span>CGPA (1-10):</label>
                        <input type="number" step="0.01" id="cgpa" required min="1" max="10">
                    </div>
                </div>
                <div class="input-group"><label><span>*</span>College Address:</label><input type="text" id="clgAddr" required minlength="1" maxlength="200"></div>
            </section>

            <section class="form-card">
                <div class="section-title"><h3><i class="fa-solid fa-users"></i> Family Details</h3></div>
                <div class="grid-2">
                    <div class="input-group"><label><span>*</span>Father's Name:</label><input type="text" id="fatherName" required minlength="1" maxlength="50"></div>
                    <div class="input-group"><label><span>*</span>Father's Phone:</label><input type="tel" id="fatherPhone" required minlength="10" maxlength="13"></div>
                </div>
                <div class="grid-2">
                    <div class="input-group"><label><span>*</span>Mother's Name:</label><input type="text" id="motherName" required minlength="1" maxlength="50"></div>
                    <div class="input-group"><label><span>*</span>Mother's Phone:</label><input type="tel" id="motherPhone" required minlength="10" maxlength="13"></div>
                </div>
                <div class="grid-2">
                    <div class="input-group"><label>Guardian Name:</label><input type="text" id="guardianName" maxlength="50"></div>
                    <div class="input-group"><label>Guardian's Phone:</label><input type="tel" id="guardianPhone" maxlength="13"></div>
                </div>
            </section>

            <section class="form-card">
                <div class="section-title"><h3><i class="fa-solid fa-home"></i> Address</h3></div>
                <div class="grid-3">
                    <div class="input-group"><label><span>*</span>House No:</label><input type="text" id="houseNo" required minlength="1" maxlength="20"></div>
                    <div class="input-group"><label><span>*</span>Village / Area:</label><input type="text" id="village" required minlength="1" maxlength="50"></div>
                    <div class="input-group"><label><span>*</span>City:</label><input type="text" id="city" required minlength="1" maxlength="50"></div>
                </div>
                <div class="grid-3">
                    <div class="input-group"><label><span>*</span>State:</label><select id="stateSelect" required><option value="">Select</option><option>Maharashtra</option><option>Delhi</option></select></div>
                    <div class="input-group"><label><span>*</span>Country:</label><select id="countrySelect" required><option value="">Select</option><option>India</option><option>USA</option></select></div>
                    <div class="input-group">
                        <label><span>*</span>Pincode:</label>
                        <input type="text" id="pincode" required pattern="\d{6}" maxlength="6" title="Exactly 6 digits required">
                    </div>
                </div>
            </section>

            <section class="form-card">
                <div class="section-title"><h3><i class="fa-solid fa-cloud-arrow-up"></i> Attachments</h3></div>
                <div class="grid-2">
                    <div class="input-group"><label><span>*</span>Photo:</label><input type="file" id="photo" accept=".jpg,.jpeg" required ></div>
                    <div class="input-group"><label><span>*</span>Resume (PDF):</label><input type="file" id="resume" accept=".pdf" required></div>
                </div>
            </section>

            <section class="form-card">
                <div class="section-title"><h3><i class="fa-solid fa-file-signature"></i> Declaration</h3></div>
                <div style="display:flex; gap:10px; align-items:flex-start;">
                    <input type="checkbox" id="declaration" required style="width:20px; height:20px;">
                    <label for="declaration">I hereby declare that all information is correct.</label>
                </div>
            </section>

            <div class="btn-container">
                <button type="submit" class="submit-btn" id="submitBtn">Submit Registration</button>
            </div>
        </form>

        <div class="table-container">
    <table>
   <thead>
    <tr>
        <th>Photo</th>
        <th>Reg No</th>
        <th>Name</th>
        <th>Phone</th>
        <th>City</th>
        <th>Qualification</th>
        <th>Actions</th>
    </tr>
</thead>
    <tbody id="studentTableBody"></tbody>
</table>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>>
</html>
